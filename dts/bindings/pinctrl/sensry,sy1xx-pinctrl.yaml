description: Sensry SY1xx PINCTRL

compatible: "sensry,sy1xx-pinctrl"

include: base.yaml

properties:
  reg:
    required: true

child-binding:
  description: Each child node defines the configuration of a particular state.

  include:
    - name: pincfg-node.yaml
      property-allowlist:
        - bias-high-impedance
        - bias-pull-down
        - bias-pull-up
        - input-enable
        - input-schmitt-enable

  properties:
    pinmux:
      required: true
      type: array
      description: |
        Pin mux selection. See the SOC level pinctrl header
        for a defined list of these options.
