description: Sensry SY1XX MDIO Driver node

compatible: "sensry,sy1xx-mdio"

include: [mdio-controller.yaml, pinctrl-device.yaml]

properties:
  pinctrl-0:
    required: true

  pinctrl-names:
    required: true

  timeout-msec:
    type: int
    default: 100
    description: |
      Timeout in milliseconds waiting for the mdio ctrl to finish read or write.
